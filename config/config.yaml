# Part 1 + Part 2 + Part 3 configuration — single source of the hyperparameters, run names,
# and model choices used by notebooks 01-03 and src/models. Paths and runtime flags (Colab vs
# local) are derived in the notebook, not here. Edit values here, not in the notebook.

seed: 42
train_seeds: [42, 43, 44]
canonical_seed: 42

dataset:
  name: "sai1908/Mental_Health_Condition_Classification"
  revision: "186902250e947738f5cb6668808431c56f75b018"

# 2a BERT fine-tuning
bert:
  model_name: bert-base-uncased
  max_length: 256
  train_batch: 8
  eval_batch: 256
  lr: 2.0e-5
  epochs: 40
  warmup_steps: 16
  weight_decay: 0.01
  logging_steps: 10
  max_final_train_loss: 0.1

# scoring / sanity
eval:
  val_sanity_n: 1000
  n_boot: 1000

# experiment run names (become results/metrics/*.json filenames)
runs:
  run_2a: part2_bert_32
  run_2b_bt: part2_bert_backtrans
  run_2b_eda: part2_bert_eda_160
  run_2c: part2_zero_shot_llm_n2100
  run_2d:
    B: part2_bert_llmgen_50
    C: part2_bert_llmgen_200
    D: part2_bert_synth_only
  removed_aug_ids: []

# 2c zero-shot LLM classification
zero_shot_2c:
  model: google/gemma-3-4b-it
  n_subset: 2100
  batch: 32
  max_new_tokens_direct: 64
  max_new_tokens_cot: 256
  max_prompt_candidates: 4
  prompt_dev_val_cap: 200

# 2d LLM-generated synthetic data
synth_2d:
  model_gen: meta-llama/Llama-3.2-3B-Instruct
  emb_model: sentence-transformers/all-MiniLM-L6-v2
  n_synth_per_class: 200
  n_raw_per_class: 260
  topup_extra:
    anxiety: 65
    bipolar: 610
    normal: 560
    "personality disorder": 780
    suicidal: 75
  gen_temperature: 0.9
  gen_top_p: 0.95
  gen_max_new: 512
  gen_batch: 16
  gen_prompt_version: v2
  dedup_cosine: 0.90

# Part 1 baselines (notebook 01): dedup thresholds + rule-based / mined-lexicon params
part1:
  junk_max_chars: 5        # texts at or below this length are degenerate
  prefix_len: 200          # near-duplicate detection: normalised-prefix length
  min_df: 20               # ignore terms in fewer than this many training documents
  alpha0: 1000.0           # Dirichlet prior strength for the log-odds statistic
  k_grid: [25, 50, 100, 200, 400, 800, 1600]
  k_final: 400             # frozen on validation

# Part 3 (notebook 03): full-data learning curve. The BERT recipe differs from the Part-2
# `bert:` block above (more rows per batch, far fewer epochs, fractional warmup), so it lives
# in its own block. seed / canonical_seed / dataset.revision / eval.* are reused from above.
part3:
  bert:
    model_name: bert-base-uncased
    max_length: 256
    train_batch: 32           # Part 2 uses 8
    eval_batch: 256
    lr: 2.0e-5
    epochs: 3                 # Part 2 uses 40
    warmup_frac: 0.10         # Part 3 warms up a fraction of total steps, not a fixed count
    weight_decay: 0.01
    logging_steps: 50
    max_final_train_loss: 1.0
  fractions: [1, 10, 25, 50, 75, 100]   # rebuilt as a tuple in the notebook
  part4_seeds: [42]                      # Part 4 teacher selection (a single seed for a quick pick)

# Part 4 (notebook 04): knowledge distillation. The student trains on the full 64k set, so it
# reuses the Part-3 BERT regime above (epochs / warmup_frac / batch / lr / max_length); only the
# distillation-specific knobs live here. Teacher is the frozen Part-3 pct100 checkpoint.
part4:
  teacher_ckpt: part3_bert_pct100_model   # under results/colab_runs/
  student_model: distilbert-base-uncased
  temperature: 2.0
  alpha: 0.7                              # weight on the soft-label KD term; (1 - alpha) on cross-entropy
  run_name: part4_student_distill
